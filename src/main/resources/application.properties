spring.application.name=exam-service

# ===================================================================
# 1. C\u1ea4U H\u00ccNH DATABASE (POSTGRESQL - HO\u00c0N TO\u00c0N BI\u1ebeN \u0110\u1ed8NG)
# ===================================================================
# \ud83d\udca1 Local: Ch\u1ea1y URL public. 
# \ud83d\ude80 Prod (Railway): \u00d4ng gi\u00e1o truy\u1ec1n URL N\u1ed8I B\u1ed8 (Private) v\u00e0o bi\u1ebfn DB_URL tr\u00ean Web
spring.datasource.url=${DB_URL:jdbc:postgresql://shuttle.proxy.rlwy.net:40995/railway?options=-c%20timezone=UTC}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:DRgpqAHrOwXiwhluMTLVdjHqZKSDknZT}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# 2. C\u1ea4U H\u00ccNH JPA / HIBERNATE & LOGGING (ATTT CAO)
# ===================================================================
# \ud83d\udca1 Local: m\u1eb7c \u0111\u1ecbnh 'update'. \ud83d\ude80 Prod: G\u00e1n bi\u1ebfn DDL_AUTO=validate \u0111\u1ec3 kh\u00f3a c\u1ea5u h\u00ecnh b\u1ea3ng.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
# \ud83d\udca1 Local: m\u1eb7c \u0111\u1ecbnh 'true' \u0111\u1ec3 xem SQL. \ud83d\ude80 Prod: G\u00e1n bi\u1ebfn SHOW_SQL=false \u0111\u1ec3 gi\u1ea3i ph\u00f3ng CPU.
spring.jpa.show-sql=${SHOW_SQL:true}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.json_format=com.fasterxml.jackson

# ===================================================================
# 3. WEB SERVER TOMCAT & PORT (C\u1ea4U H\u00ccNH CH\u1ecaU T\u1ea2I 1000 USERS)
# ===================================================================
# \ud83d\udea8 GI\u1eee NGUY\u00caN D\u00d2NG N\u00c0Y: \u0110\u1ec3 Railway t\u1ef1 c\u1ea5p c\u1ed5ng ch\u1ea1y n\u1ed9i b\u1ed9
server.port=${PORT:8080}
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
server.servlet.encoding.force=true

server.tomcat.threads.max=1000
server.tomcat.accept-count=1500

# ===================================================================
# 4. HIKARI CONNECTION POOL (B\u1ea2O TR\u00cc \u0110\u01af\u1edcNG \u1ed0NG NG\u1ea6M DB - CH\u1ed0NG S\u1eacP)
# ===================================================================
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-test-query=SELECT 1

# ===================================================================
# 5. C\u1ea4U H\u00ccNH \u0110\u01af\u1edcNG TRUY\u1ec0N CORS (FRONTEND ORIGIN)
# ===================================================================
# \ud83d\udca1 Local: Nh\u1eadn port 3000. \ud83d\ude80 Prod: G\u00e1n bi\u1ebfn CORS_ALLOWED_ORIGINS=domain_vercel_c\u1ee7a_\u00f4ng
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cookie.secure=${COOKIE_SECURE:false}

